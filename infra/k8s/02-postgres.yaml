apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-data
  namespace: llm-obs
spec:
  accessModes: ['ReadWriteOnce']
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: llm-obs
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels: { app: postgres }
  template:
    metadata:
      labels: { app: postgres }
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: obs
            - name: POSTGRES_DB
              value: observability
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef: { name: obs-secrets, key: POSTGRES_PASSWORD }
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec: { command: ['pg_isready', '-U', 'obs', '-d', 'observability'] }
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests: { cpu: '100m', memory: '256Mi' }
            limits: { cpu: '1', memory: '1Gi' }
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: postgres-data
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: llm-obs
spec:
  selector: { app: postgres }
  ports:
    - port: 5432
      targetPort: 5432
